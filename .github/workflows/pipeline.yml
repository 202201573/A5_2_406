name: ML Pipeline

on:
push:
branches: [ main ]

jobs:

validate:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install dependencies
    run: |
      pip install -r requirements.txt
      pip install dvc

  - name: Configure DVC remote
    run: |
      dvc remote modify origin auth basic
      dvc remote modify origin user ${{ secrets.DAGSHUB_USERNAME }}
      dvc remote modify origin password ${{ secrets.DAGSHUB_TOKEN }}

  - name: Pull data
    run: dvc pull

  - name: Train model
    run: python train.py

  - name: Upload model info
    uses: actions/upload-artifact@v4
    with:
      name: model-info
      path: model_info.txt

  - name: Upload mlruns
    uses: actions/upload-artifact@v4
    with:
      name: mlruns
      path: mlruns
```

deploy:
needs: validate
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install dependencies
    run: pip install -r requirements.txt

  - name: Download model info
    uses: actions/download-artifact@v4
    with:
      name: model-info

  - name: Download mlruns
    uses: actions/download-artifact@v4
    with:
      name: mlruns

  - name: Fix mlruns path
    run: |
      mv mlruns/mlruns/* mlruns/ || true

  - name: Check threshold
    run: python check_threshold.py

  - name: Mock Docker Build
    run: |
      echo "Building Docker image for Run ID: $(cat model_info.txt)"
```
